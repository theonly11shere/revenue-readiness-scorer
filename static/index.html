<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilloka — Revenue Readiness Scorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root {
  --bg: #0a0a0f;
  --bg-card: #111118;
  --gold: #d4af37;
  --gold-dim: #8a7020;
  --text: #e8e6e1;
  --text-muted: #7a7880;
  --text-dim: #4a4850;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  perspective: 1200px;
}

.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(212,175,55,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,175,55,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.bg-glow {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* 3D Floating Logo */
.logo-3d {
  position: relative;
  z-index: 10;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 3.5rem;
  font-weight: 700;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(212,175,55,0.3);
  transform-style: preserve-3d;
  animation: float 6s ease-in-out infinite;
  margin-bottom: 40px;
}

.logo-3d::after {
  content: 'TRILLOKA';
  position: absolute;
  top: 0; left: 0;
  color: transparent;
  -webkit-text-stroke: 1px rgba(212,175,55,0.15);
  transform: translateZ(-20px);
  filter: blur(2px);
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotateX(5deg); }
  50% { transform: translateY(-15px) rotateX(-5deg); }
}

.tagline {
  position: relative; z-index: 10;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.1rem;
  color: var(--text-muted);
  text-align: center;
  max-width: 420px;
  line-height: 1.6;
  margin-bottom: 50px;
  transform-style: preserve-3d;
}

.tagline em {
  color: var(--gold);
  font-style: normal;
}

/* Input in 3D space */
.input-scene {
  position: relative;
  z-index: 10;
  transform-style: preserve-3d;
  transform: rotateX(10deg);
  transition: transform 0.5s ease;
}

.input-scene:hover {
  transform: rotateX(0deg);
}

.input-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  transform-style: preserve-3d;
}

.domain-input {
  background: var(--bg-card);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 14px;
  padding: 18px 28px;
  font-size: 1.05rem;
  color: var(--text);
  width: 340px;
  outline: none;
  transition: all 0.3s;
  transform: translateZ(30px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.domain-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(212,175,55,0.15), 0 10px 40px rgba(0,0,0,0.4);
}

.domain-input::placeholder { color: var(--text-dim); }

.scan-btn {
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 14px;
  padding: 18px 36px;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  transform: translateZ(50px);
  box-shadow: 0 10px 40px rgba(212,175,55,0.2);
}

.scan-btn:hover {
  transform: translateZ(70px) scale(1.05);
  box-shadow: 0 15px 50px rgba(212,175,55,0.35);
}

.scan-btn:disabled {
  opacity: 0.5; cursor: not-allowed; transform: translateZ(50px);
}

.sub-text {
  position: relative; z-index: 10;
  margin-top: 24px;
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* Loading */
.loading-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,10,15,0.95);
  z-index: 100;
  flex-direction: column;
  align-items: center; justify-content: center;
}

.loading-overlay.active { display: flex; }

.loader-ring {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 3px solid rgba(212,175,55,0.1);
  border-top-color: var(--gold);
  animation: spin 1s linear infinite;
}

.loading-text {
  margin-top: 20px;
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .logo-3d { font-size: 2.2rem; letter-spacing: 4px; }
  .tagline { font-size: 0.9rem; padding: 0 20px; }
  .input-wrap { flex-direction: column; width: 100%; padding: 0 20px; }
  .domain-input { width: 100%; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<header style="position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid rgba(212,175,55,0.08);">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#d4af37;">TRILLOKA</div>
  <nav style="display:flex;gap:32px;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;">
    <a href="/" style="color:#7a7880;text-decoration:none;transition:color 0.3s;">Solutions</a>
    <a href="/vlog" style="color:#7a7880;text-decoration:none;transition:color 0.3s;">Vlog</a>
    <a href="/contact" style="color:#7a7880;text-decoration:none;transition:color 0.3s;">Contact</a>
  </nav>
</header>


<div class="logo-3d">TRILLOKA</div>

<p class="tagline">
  Your site earns nothing while it looks like <em>everyone else.</em><br>
  We diagnose why visitors don't convert.
</p>

<div class="input-scene">
  <div class="input-wrap">
    <input type="text" class="domain-input" id="domainInput" placeholder="yourdomain.com" autofocus>
    <button class="scan-btn" id="scanBtn" onclick="startScan()">Scan</button>
  </div>
</div>

<p class="sub-text">Free 4-point revenue readiness scan. No signup.</p>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loading-text" id="loadingText">Analyzing...</div>
</div>

<script>
const API_BASE = '';
const loadingMessages = [
  "Crawling page architecture...",
  "Detecting template fingerprints...",
  "Analyzing content voice...",
  "Matching visual signatures...",
  "Scanning social signals...",
  "Compiling the verdict..."
];

async function startScan() {
  const input = document.getElementById('domainInput').value.trim();
  if (!input) return;

  const btn = document.getElementById('scanBtn');
  const overlay = document.getElementById('loadingOverlay');
  const loadingText = document.getElementById('loadingText');

  btn.disabled = true;
  overlay.classList.add('active');

  let msgIdx = 0;
  loadingText.textContent = loadingMessages[0];
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    loadingText.textContent = loadingMessages[msgIdx];
  }, 800);

  try {
    const response = await fetch(`${API_BASE}/api/v1/scan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: input, tier: 'free' })
    });
    const data = await response.json();
    clearInterval(msgInterval);

    // Store result and navigate to results page
    sessionStorage.setItem('rrs_result', JSON.stringify(data));
    sessionStorage.setItem('rrs_domain', input);
    window.location.href = '/results';

  } catch (err) {
    clearInterval(msgInterval);
    overlay.classList.remove('active');
    btn.disabled = false;
    // Fallback: generate demo data and still go to results
    let hash = 0;
    for (let i = 0; i < input.length; i++) {
      hash = ((hash << 5) - hash) + input.charCodeAt(i);
      hash |= 0;
    }
    hash = Math.abs(hash);
    const demoData = {
      domain: input.replace(/^https?:\/\//, '').replace(/^www\./, ''),
      metrics: {
        template_trap: { score: 45 + (hash % 45), label: 'Templated', detected_template: 'WordPress Elementor', note: 'Generic framework detected' },
        sameness: { score: hash % 60, label: 'Some Originality', sites_with_same_voice: (hash % 50) * 100, note: '3 cliché phrases found' },
        visual_twin: { similarity_percent: hash % 40, label: 'Some Overlap', closest_match_url: 'competitor-example.com', note: 'Layout similarities detected' },
        presence: { score: hash % 80, label: hash % 80 > 40 ? 'Discussed' : 'Quiet', mentions_found: hash % 20, note: `${hash % 20} mentions found` }
      },
      scores: {
        readiness_score: 40 + (hash % 50),
        evidence_coverage: 35 + (hash % 55),
        confidence_score: 45 + (hash % 45)
      }
    };
    sessionStorage.setItem('rrs_result', JSON.stringify(demoData));
    sessionStorage.setItem('rrs_domain', input);
    window.location.href = '/results';
  }
}

document.getElementById('domainInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') startScan();
});
</script>

</body>
</html>
